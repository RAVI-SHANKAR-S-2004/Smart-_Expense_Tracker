<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Expense Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
  
 <link rel="icon" type="image/x-icon" href="./assets/logo.png" />
<style>

body{
background:linear-gradient(135deg,#4e73df,#1cc88a);
min-height:100vh;
font-family:Segoe UI;
}

.dark-mode{
background:#121212 !important;
color:white;
}

.app-card{
background:white;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.summary-box{
background:#f3f6fb;
border-radius:10px;
padding:18px;
text-align:center;
font-weight:600;
}

.table-container{
overflow-x:auto;
}

.empty{
text-align:center;
padding:20px;
color:#777;
}

.toast{
position:fixed;
bottom:20px;
right:20px;
background:#333;
color:white;
padding:10px 15px;
border-radius:8px;
z-index:1000;
}

</style>

</head>

<body>

<div class="container py-4">

<h2 class="text-center text-white mb-4">💰 Smart Expense Tracker</h2>

<div class="text-end mb-3">

<button class="btn btn-dark btn-sm" onclick="toggleDark()">🌙 Dark Mode</button>

<button class="btn btn-danger btn-sm" onclick="exportPDF()">📄 Export PDF</button>

<button class="btn btn-info btn-sm" onclick="openAnalysis()">📊 Expense Analysis</button>

</div>

<!-- FORM -->

<div class="app-card p-3 mb-4">

<div class="row g-2">

<div class="col-md-4">
<input id="title" class="form-control" placeholder="Expense title">
</div>

<div class="col-md-3">
<input id="amount" type="number" class="form-control" placeholder="Amount">
</div>

<div class="col-md-3">

<select id="category" class="form-select">

<option value="">Category</option>
<option>Food</option>
<option>Travel</option>
<option>Shopping</option>
<option>Bills</option>
<option>Other</option>

</select>

</div>

<div class="col-md-2 d-grid">
<button onclick="addExpense()" class="btn btn-primary">Add</button>
</div>

</div>
</div>

<!-- SUMMARY -->

<div class="row g-3 mb-4">

<div class="col-md-3">
<div class="summary-box">
Total ₹ <span id="total">0</span>
</div>
</div>

<div class="col-md-3">
<div class="summary-box">
Entries <span id="count">0</span>
</div>
</div>

<div class="col-md-3">
<div class="summary-box">
Today ₹ <span id="todayTotal">0</span>
</div>
</div>

<div class="col-md-3">
<div class="summary-box">
Month ₹ <span id="monthTotal">0</span>
</div>
</div>

</div>

<!-- SEARCH -->

<input id="search" class="form-control mb-3"
placeholder="Search expense..." onkeyup="displayExpenses()">

<!-- TABLE -->

<div class="app-card p-3">

<div class="table-container">

<table class="table table-striped">

<thead class="table-dark">

<tr>
<th>Title</th>
<th>Amount</th>
<th>Category</th>
<th>Date</th>
<th>Time</th>
<th>Edit</th>
<th>Delete</th>
</tr>

</thead>

<tbody id="expenseList"></tbody>

</table>

</div>

<div id="emptyMsg" class="empty"></div>

<button class="btn btn-outline-danger btn-sm" onclick="clearAll()">
Clear All Data
</button>

</div>

</div>

<!-- ANALYSIS POPUP -->

<div class="modal fade" id="analysisModal">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">Expense Analysis</h5>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<canvas id="expenseChart"></canvas>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
let chart;

function notify(msg){

let toast=document.createElement("div");
toast.className="toast";
toast.innerText=msg;

document.body.appendChild(toast);

setTimeout(()=>toast.remove(),2000);

}

function getDate(){
return new Date().toLocaleDateString("en-GB");
}

function getTime(){
return new Date().toLocaleTimeString();
}

function addExpense(){

let title=document.getElementById("title").value.trim();
let amount=parseFloat(document.getElementById("amount").value);
let category=document.getElementById("category").value;

if(!title||!amount||!category){
notify("Fill all fields");
return;
}

expenses.push({
id:Date.now(),
title,
amount,
category,
date:getDate(),
time:getTime()
});

save();
clearForm();
displayExpenses();

notify("Expense Added");

}

function clearForm(){
document.getElementById("title").value="";
document.getElementById("amount").value="";
document.getElementById("category").value="";
}

function save(){
localStorage.setItem("expenses",JSON.stringify(expenses));
}

function displayExpenses(){

let list=document.getElementById("expenseList");
let search=document.getElementById("search").value.toLowerCase();

list.innerHTML="";

let total=0;
let todayTotal=0;
let monthTotal=0;

let today=getDate();
let month=new Date().getMonth();
let year=new Date().getFullYear();

let filtered=expenses.filter(e=>
e.title.toLowerCase().includes(search) ||
e.category.toLowerCase().includes(search)
);

filtered.forEach(e=>{

total+=e.amount;

if(e.date===today) todayTotal+=e.amount;

let d=new Date(e.date.split("/").reverse().join("-"));

if(d.getMonth()===month && d.getFullYear()===year){
monthTotal+=e.amount;
}

list.innerHTML+=`
<tr>
<td>${e.title}</td>
<td>₹${e.amount}</td>
<td>${e.category}</td>
<td>${e.date}</td>
<td>${e.time}</td>

<td>
<button class="btn btn-warning btn-sm" onclick="editExpense(${e.id})">Edit</button>
</td>

<td>
<button class="btn btn-danger btn-sm" onclick="deleteExpense(${e.id})">Delete</button>
</td>
</tr>
`;

});

document.getElementById("total").innerText=total;
document.getElementById("count").innerText=filtered.length;
document.getElementById("todayTotal").innerText=todayTotal;
document.getElementById("monthTotal").innerText=monthTotal;

document.getElementById("emptyMsg").innerText=
filtered.length==0?"No expenses found.":"";

}

function deleteExpense(id){

if(confirm("Delete this expense?")){

expenses=expenses.filter(e=>e.id!==id);

save();
displayExpenses();

notify("Expense Deleted");

}

}

function editExpense(id){

let e=expenses.find(x=>x.id===id);

document.getElementById("title").value=e.title;
document.getElementById("amount").value=e.amount;
document.getElementById("category").value=e.category;

deleteExpense(id);

}

function clearAll(){

if(confirm("Clear all data?")){

localStorage.removeItem("expenses");
expenses=[];
displayExpenses();

}

}

function toggleDark(){
document.body.classList.toggle("dark-mode");
}

function openAnalysis(){

let modal=new bootstrap.Modal(document.getElementById("analysisModal"));
modal.show();

setTimeout(updateChart,300);

}

async function exportPDF(){

const { jsPDF } = window.jspdf;

let doc=new jsPDF();

doc.setFontSize(18);
doc.text("Expense Report",14,20);

let rows=[];

expenses.forEach(e=>{
rows.push([
e.title,
"₹"+e.amount,
e.category,
e.date,
e.time
])
});

doc.autoTable({
head:[["Title","Amount","Category","Date","Time"]],
body:rows,
startY:30
});

let total=expenses.reduce((sum,e)=>sum+e.amount,0);

doc.text("Total Expense: ₹"+total,14,doc.lastAutoTable.finalY+10);

doc.save("expense-report.pdf");

}

function updateChart(){

let categoryTotals={};

expenses.forEach(e=>{
categoryTotals[e.category]=(categoryTotals[e.category]||0)+e.amount;
});

let labels=Object.keys(categoryTotals);
let data=Object.values(categoryTotals);

if(chart){
chart.destroy();
}

chart=new Chart(document.getElementById("expenseChart"),{

type:"doughnut",

data:{
labels:labels,
datasets:[{
data:data,
backgroundColor:[
"#4e73df",
"#1cc88a",
"#36b9cc",
"#f6c23e",
"#e74a3b"
]
}]
},

options:{
responsive:true,
plugins:{
legend:{position:"bottom"}
}
}

});

}

document.addEventListener("keydown",function(e){
if(e.key==="Enter"){
addExpense();
}
});

displayExpenses();

</script>

</body>
</html>
